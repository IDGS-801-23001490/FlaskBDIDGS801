{% extends "layout.html" %}
{% block container %}
<div class="max-w-screen-xl mx-auto p-4 mt-8">
    <h1 class="text-3xl font-bold mb-6 text-gray-800 text-center">Eliminar Maestro</h1>
    <div class="bg-white shadow-md rounded-lg p-6 max-w-lg mx-auto border border-red-100">
        <p class="text-lg text-gray-600 text-center mb-6">¿Estás seguro de eliminar a <strong>{{ maestro.nombre
                }}</strong>? Esta acción no se puede deshacer.</p>
        <form method="POST" class="flex flex-col sm:flex-row gap-4 justify-center">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            <button type="submit"
                class="flex-1 bg-red-600 hover:bg-red-700 text-white font-bold rounded-lg px-6 py-3">Confirmar
                Eliminar</button>
            <a href="{{ url_for('maestros.index') }}"
                class="flex-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold rounded-lg px-6 py-3 text-center">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
