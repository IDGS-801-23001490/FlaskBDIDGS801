<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowbite Flask</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dist/output.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <nav class="bg-white border-gray-200 px-4 py-2.5 dark:bg-gray-900 border-b dark:border-gray-700">
        <div class="container flex flex-wrap items-center justify-between mx-auto">

            <div class="flex flex-1 items-center justify-start">
                <a href="{{ url_for('index') }}" class="flex items-center">
                    <img src="{{ url_for('static', filename='img/alumno.png') }}" class="rounded-2xl h-6 mr-3 sm:h-9"
                        alt="Logo">
                    <span class="self-center text-xl font-semibold whitespace-nowrap dark:text-white">Flask IDGS</span>
                </a>
            </div>

            <div class="hidden md:flex flex-1 items-center justify-center">
                <ul class="flex flex-row space-x-8 text-sm font-medium mt-0 border-0 bg-transparent">
                    <li>
                        <a href="{{ url_for('index') }}"
                            class="block py-2 text-gray-700 hover:text-blue-700 dark:text-white transition-colors">Inicio</a>
                    </li>
                    <li>
                        <a href="{{ url_for('alumnos.index') }}"
                            class="block py-2 text-gray-700 hover:text-blue-700 dark:text-gray-400 transition-colors">Alumnos</a>
                    </li>
                    <li>
                        <a href="{{ url_for('maestros.index') }}"
                            class="block py-2 text-gray-700 hover:text-blue-700 dark:text-gray-400 transition-colors">Maestros</a>
                    </li>
                    <li>
                        <a href="{{ url_for('cursos.index') }}"
                            class="block py-2 text-gray-700 hover:text-blue-700 dark:text-gray-400 transition-colors">Cursos</a>
                    </li>
                </ul>
            </div>

            <div class="flex flex-1 items-center justify-end">
                <button type="button"
                    class="text-white bg-blue-700 hover:bg-blue-800 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-blue-600 transition-colors">
                    Cerrar Sesión
                </button>
            </div>

        </div>
    </nav>

    <div class="flex items-center justify-center min-h-[80vh]">
        {% block container %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
</body>

</html>
